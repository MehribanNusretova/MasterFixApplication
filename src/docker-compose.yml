services:
  postgres:
    image: postgres:16
    container_name: ustafix-postgres
    environment:
      POSTGRES_DB: ustafix_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: